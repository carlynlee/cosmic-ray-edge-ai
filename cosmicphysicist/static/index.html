<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07071a">
<title>CosmicPhysicist</title>
<link rel="manifest" href="/manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07071a;color:#d0d8ff;font-family:'SF Mono',Menlo,'Courier New',monospace;font-size:13px;min-height:100vh;display:flex;flex-direction:column}

header{padding:14px 16px 10px;border-bottom:1px solid #12123a;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
h1{font-size:14px;color:#7ab4ff;letter-spacing:3px;font-weight:600}
.status-bar{display:flex;gap:10px}
.status{display:flex;align-items:center;gap:5px;font-size:10px;color:#404070}
.dot{width:7px;height:7px;border-radius:50%;background:#1a1a3a;transition:background .2s,box-shadow .2s}
.dot.on{background:#00ff88;box-shadow:0 0 8px #00ff88}
.dot.busy{background:#ffaa00;box-shadow:0 0 6px #ffaa00}

.cam-section{padding:12px 16px;border-bottom:1px solid #12123a;display:flex;gap:14px;align-items:center;flex-shrink:0}
#canvas-wrap{width:72px;height:72px;border:1px solid #1a1a4a;border-radius:6px;overflow:hidden;background:#000;flex-shrink:0}
#detector-canvas{width:100%;height:100%;display:block}
video{display:none}
.cam-info{flex:1;min-width:0}
.cam-info h2{font-size:12px;color:#7ab4ff;letter-spacing:1px;margin-bottom:4px}
#cam-status{font-size:11px;color:#40407a;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#start-btn{padding:7px 14px;background:#0e0e2e;border:1px solid #2a2a7a;color:#7ab4ff;border-radius:5px;font-family:inherit;font-size:11px;cursor:pointer;letter-spacing:1px}
#start-btn.active{background:#051a10;border-color:#00aa66;color:#00ff88}

.stats{display:flex;padding:7px 16px;gap:0;border-bottom:1px solid #12123a;flex-shrink:0}
.stat{flex:1;text-align:center;font-size:10px;color:#40407a;border-right:1px solid #12123a}
.stat:last-child{border-right:none}
.stat strong{display:block;font-size:18px;color:#a0b8ff;margin-bottom:1px}
.stat.highlight strong{color:#00ff88}

#feed{flex:1;overflow-y:auto;padding:4px 0}

.card{padding:10px 16px;border-bottom:1px solid #0c0c28;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.card.correlated{background:#040f09;border-left:3px solid #00ff88;padding-left:13px}
.card.coincidence{border-left:3px solid #ff8c00;padding-left:13px}
.card.correlated.coincidence{border-left:3px solid #00ff88}

.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.badge{font-size:9px;font-weight:700;letter-spacing:1.5px;padding:2px 7px;border-radius:3px}
.badge-cw{background:#0e0e30;color:#7ab4ff}
.badge-iphone{background:#071a10;color:#40e080}
.card-time{font-size:10px;color:#30305a}

.card-data{font-size:11px;color:#8090c0;margin-bottom:6px;line-height:1.6}
.hl{color:#c0d0ff}
.coincidence-tag{color:#ff8c00;font-weight:bold}
.corr-tag{color:#00ff88;font-size:10px;background:#041208;padding:1px 6px;border-radius:3px;margin-left:6px}

.card-interp{font-size:12px;color:#b8c8f8;line-height:1.6;background:#0b0b22;border-radius:4px;padding:7px 10px}
.card-interp.loading{color:#30306a;font-style:italic}
</style>
</head>
<body>

<header>
  <h1>COSMICPHYSICIST</h1>
  <div class="status-bar">
    <div class="status"><div class="dot" id="dot-cw"></div>CW</div>
    <div class="status"><div class="dot" id="dot-cam"></div>CAM</div>
    <div class="status"><div class="dot" id="dot-llm"></div>LLM</div>
    <div class="status"><div class="dot" id="dot-sse"></div>LIVE</div>
  </div>
</header>

<div class="cam-section">
  <div id="canvas-wrap">
    <canvas id="detector-canvas" width="144" height="144"></canvas>
  </div>
  <video id="video" autoplay playsinline muted></video>
  <div class="cam-info">
    <h2>iPHONE DETECTOR</h2>
    <div id="cam-status">Cover lens completely before starting.</div>
    <button id="start-btn" onclick="toggleDetector()">▶ START</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><strong id="n-cw">0</strong>CW EVENTS</div>
  <div class="stat"><strong id="n-iph">0</strong>iPHONE HITS</div>
  <div class="stat highlight"><strong id="n-corr">0</strong>CORRELATED</div>
</div>

<div id="feed"></div>

<script>
const feed = document.getElementById('feed');
let nCW = 0, nIph = 0, nCorr = 0;
let detectorOn = false, mediaStream = null, frameTimer = null;
let baseline = null, baseFrames = 0, hotPixels = new Set(), pixelHits = {};
const BASELINE_N = 40, THRESHOLD = 40, MIN_PX = 2, MAX_PX = 100, HOT_N = 15;
const W = 320, H = 180;
const offscreen = document.createElement('canvas');
offscreen.width = W; offscreen.height = H;
const octx = offscreen.getContext('2d', {willReadFrequently: true});

// --- SSE ---
function connectSSE() {
  const es = new EventSource('/stream');
  es.addEventListener('open', () => setDot('sse', 'on'));
  es.addEventListener('error', () => { setDot('sse', ''); setTimeout(connectSSE, 3000); });
  es.addEventListener('cosmicwatch', e => onCW(JSON.parse(e.data)));
  es.addEventListener('iphone', e => onIph(JSON.parse(e.data)));
  es.addEventListener('interpretation', e => onInterp(JSON.parse(e.data)));
}
connectSSE();

function setDot(name, cls) {
  const d = document.getElementById('dot-' + name);
  d.className = 'dot' + (cls ? ' ' + cls : '');
}
function flashDot(name) {
  setDot(name, 'on');
  setTimeout(() => setDot(name, ''), 600);
}

function onCW(ev) {
  nCW++; document.getElementById('n-cw').textContent = nCW;
  flashDot('cw');
  addCard('cw', ev);
}
function onIph(ev) {
  nIph++; document.getElementById('n-iph').textContent = nIph;
  flashDot('cam');
  addCard('iph', ev);
}
function onInterp(ev) {
  setDot('llm', 'busy');
  setTimeout(() => setDot('llm', ''), 1200);
  if (ev.correlated) { nCorr++; document.getElementById('n-corr').textContent = nCorr; }
  const el = document.getElementById('interp-' + ev.source + '-' + ev.id);
  if (!el) return;
  el.className = 'card-interp';
  el.textContent = ev.interpretation;
  if (ev.correlated) {
    el.innerHTML += ' <span class="corr-tag">⚡ CORRELATED</span>';
    el.closest('.card').classList.add('correlated');
  }
}

function addCard(type, ev) {
  const card = document.createElement('div');
  const isCoinc = type === 'cw' && ev.coincidence_flag;
  card.className = 'card' + (isCoinc ? ' coincidence' : '');
  const t = new Date().toLocaleTimeString('en-US', {hour12: false});
  const id = ev.id || Date.now();

  let dataHTML = '';
  if (type === 'cw') {
    dataHTML = `<span class="hl">ADC ${ev.adc_value}</span>  SiPM ${ev.sipm_mv}mV  `
             + `P ${Math.round(ev.pressure_pa)}Pa  T ${ev.temperature_c}°C`
             + (isCoinc ? '  <span class="coincidence-tag">⚡ COINCIDENCE</span>' : '');
  } else {
    dataHTML = `<span class="hl">${ev.cluster_size}px cluster</span>  brightness ${(ev.brightness||0).toFixed(1)}`;
  }

  card.id = 'card-' + type + '-' + id;
  card.innerHTML = `
    <div class="card-head">
      <span class="badge ${type === 'cw' ? 'badge-cw' : 'badge-iphone'}">${type === 'cw' ? 'COSMICWATCH' : 'iPHONE'}</span>
      <span class="card-time">${t}</span>
    </div>
    <div class="card-data">${dataHTML}</div>
    <div class="card-interp loading" id="interp-${type === 'cw' ? 'cosmicwatch' : 'iphone'}-${id}">interpreting…</div>`;

  feed.insertBefore(card, feed.firstChild);
  while (feed.children.length > 60) feed.removeChild(feed.lastChild);
}

// --- Camera detector ---
async function toggleDetector() {
  detectorOn ? stopDetector() : await startDetector();
}

async function startDetector() {
  if (!navigator.mediaDevices?.getUserMedia) {
    document.getElementById('cam-status').textContent = 'Camera API not available (needs HTTPS).';
    return;
  }
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    const vid = document.getElementById('video');
    vid.srcObject = mediaStream;
    await vid.play();
    detectorOn = true;
    baseline = null; baseFrames = 0; hotPixels.clear(); pixelHits = {};
    document.getElementById('start-btn').textContent = '■ STOP';
    document.getElementById('start-btn').className = 'active';
    document.getElementById('cam-status').textContent = 'Calibrating… keep lens covered.';
    frameTimer = setInterval(processFrame, 500);
  } catch (err) {
    document.getElementById('cam-status').textContent = 'Error: ' + err.message;
  }
}

function stopDetector() {
  clearInterval(frameTimer);
  mediaStream?.getTracks().forEach(t => t.stop());
  detectorOn = false; mediaStream = null; baseline = null;
  document.getElementById('start-btn').textContent = '▶ START';
  document.getElementById('start-btn').className = '';
  document.getElementById('cam-status').textContent = 'Detector stopped.';
  setDot('cam', '');
}

function processFrame() {
  const vid = document.getElementById('video');
  if (vid.readyState < 2) return;
  octx.drawImage(vid, 0, 0, W, H);
  const img = octx.getImageData(0, 0, W, H).data;

  const gray = new Float32Array(W * H);
  for (let i = 0; i < W * H; i++)
    gray[i] = (img[i*4] + img[i*4+1] + img[i*4+2]) / 3;

  if (baseFrames < BASELINE_N) {
    if (!baseline) baseline = new Float32Array(W * H);
    for (let i = 0; i < gray.length; i++) baseline[i] += gray[i];
    if (++baseFrames === BASELINE_N) {
      for (let i = 0; i < baseline.length; i++) baseline[i] /= BASELINE_N;
      document.getElementById('cam-status').textContent = 'Detecting — 0 hits';
      setDot('cam', 'on');
    }
    return;
  }

  // Update hot pixel map
  for (let i = 0; i < gray.length; i++) {
    if (gray[i] - baseline[i] > THRESHOLD) {
      pixelHits[i] = (pixelHits[i] || 0) + 1;
      if (pixelHits[i] > HOT_N) hotPixels.add(i);
    }
  }

  // Find hit pixels
  const hit = new Uint8Array(W * H);
  for (let i = 0; i < gray.length; i++)
    if (!hotPixels.has(i) && gray[i] - baseline[i] > THRESHOLD) hit[i] = 1;

  // Connected components
  const visited = new Uint8Array(W * H);
  const clusters = [];
  for (let i = 0; i < W * H; i++) {
    if (!hit[i] || visited[i]) continue;
    const cluster = [], stack = [i];
    while (stack.length) {
      const idx = stack.pop();
      if (idx < 0 || idx >= W*H || visited[idx] || !hit[idx]) continue;
      visited[idx] = 1; cluster.push(idx);
      const x = idx % W;
      if (x > 0)   stack.push(idx - 1);
      if (x < W-1) stack.push(idx + 1);
      if (idx >= W) stack.push(idx - W);
      if (idx < W*(H-1)) stack.push(idx + W);
    }
    if (cluster.length >= MIN_PX && cluster.length <= MAX_PX) clusters.push(cluster);
  }

  // Draw visualization
  const cvs = document.getElementById('detector-canvas');
  const ctx = cvs.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cvs.width, cvs.height);
  if (clusters.length) {
    const sx = cvs.width / W, sy = cvs.height / H;
    ctx.fillStyle = '#00ff88';
    for (const cl of clusters)
      for (const idx of cl) {
        const x = idx % W, y = Math.floor(idx / W);
        ctx.fillRect(x*sx - 1, y*sy - 1, sx + 2, sy + 2);
      }
    // Report hits
    for (const cl of clusters) {
      let bright = 0;
      for (const idx of cl) bright += gray[idx] - baseline[idx];
      fetch('/api/iphone', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({cluster_size: cl.length, brightness: bright / cl.length})
      });
    }
    document.getElementById('cam-status').textContent = `Detecting — ${nIph} hits`;
  }
}

if ('serviceWorker' in navigator)
  navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
</body>
</html>
