apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-training
  namespace: cblee-credo
  labels:
    app: fl-training
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fl-training
  template:
    metadata:
      labels:
        app: fl-training
    spec:
      # Add specific node selector for the QAIC node
      nodeSelector:
        kubernetes.io/hostname: nrp-ai-100-02.sdsc.optiputer.net
      # Add specific toleration for the QAIC node
      tolerations:
      - key: "nautilus.io/qaic"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: fl-container
        image: gitlab-registry.nrp-nautilus.io/cloud-ai-100/qaic-docker-images:vllm-latest
        resources:
          requests:
            cpu: "4"
            memory: "16Gi"
            qualcomm.com/qaic: 1
          limits:
            cpu: "8"
            memory: "32Gi"
            qualcomm.com/qaic: 1
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: TF_CPP_MIN_LOG_LEVEL
          value: "2"
        volumeMounts:
        - name: code-volume
          mountPath: /workspace
        - name: data-volume
          mountPath: /data
        ports:
        - containerPort: 8888
          name: jupyter
        workingDir: /workspace
        command: ["jupyter", "notebook", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--NotebookApp.token=''", "--notebook-dir=/workspace"]
      volumes:
      - name: code-volume
        persistentVolumeClaim:
          claimName: fl-pvc-cblee
      - name: data-volume
        persistentVolumeClaim:
          claimName: fl-data-pvc-cblee
