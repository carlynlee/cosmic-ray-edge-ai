apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: credo-pvc-cblee
  namespace: cblee-credo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi  # For code and models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: credo-data-pvc-cblee
  namespace: cblee-credo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi  # For processed data and exports
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: credo-images-pvc-cblee
  namespace: cblee-credo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi  # For extracted images from hit-images-final.zip 